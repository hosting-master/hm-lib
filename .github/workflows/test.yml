name: Test

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - release/**
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Test (Go 1.26)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test

      - name: Run tests with race detector
        run: make test-race

      - name: Run linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          config-path: ./templates/golangci-linter/golangci.yaml
          args: --timeout=5m

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests with coverage
        run: make test-cover

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

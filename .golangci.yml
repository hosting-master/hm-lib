# GolangCI-Lint Configuration for HostingMaster
# Based on: https://golangci-lint.run/usage/configuration/

linters-settings:
  # Static analysis
  staticcheck:
    checks:
      - all
      - SA1019 # Deprecated functions
    go: "1.21"

  # Style
  gci:
    sections:
      - standard
      - default
      - prefix(github.com)
      - prefix(hostingmaster.io)
    skip-generated: true
    custom-order: true

  # Formatting
  gofumpt:
    lang-version: "1.21"
    extra-rules: true
    module-path: hostingmaster.io

  # Import sorting
  goimports:
    local-prefixes: hostingmaster.io

  # Line length
  lll:
    line-length: 120
    tab-length: 4

  # Function length
  funlen:
    lines: 100
    statements: 50

  # Cyclomatic complexity
  gocyclo:
    min-complexity: 20

  # Error handling
  errcheck:
    check-type-assertions: true
    check-blank: true

  # Unused code
  deadcode:
    ignore:
      - github.com/grpc-ecosystem/grpc-gateway

linters:
  # Enable linters
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - deadcode
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - exportloopref
    - forbidigo
    - gci
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goerr113
    - gofmt
    - gofumpt
    - goimports
    - gomoddirectives
    - gomodguard
    - goprintffuncname
    - gosec
    - gosimple
    - gosmopolitan
    - govet
    - ifshort
    - importas
    - lll
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - paralleltest
    - prealloc
    - protocetype
    - reassign
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - stylecheck
    - tagliatelle
    - tenv
    - testableexamples
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - varnamelen
    - wastedassign
    - whitespace

  # Disable linters
  disable:
    - funlen
    - gocognit
    - godox
    - goheader
    - ireturn
    - nlreturn
    - nonamedreturns
    - testpackage
    - varcheck
    - wsl

  # Presets
  presets:
    - bugs
    - comment
    - complexity
    - error
    - format
    - import
    - metalinter
    - module
    - performance
    - sql
    - style
    - test
    - unused

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true

severity:
  default-severity: error
  case-sensitivity: false
